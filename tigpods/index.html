<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TigPods — Coming Soon</title>
<link rel="icon" type="image/png" href="/public/assets/logo-theintgen.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root { --navy:#1A0A3C; --yellow:#FFD600; --white:#FFFFFF; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
  .eyebrow{font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--yellow);margin-bottom:1.5rem;}
  h1{font-family:'Syne',sans-serif;font-size:clamp(3rem,10vw,7rem);font-weight:800;line-height:0.95;letter-spacing:-0.03em;margin-bottom:1.5rem;}
  p{font-size:1rem;font-weight:300;color:rgba(255,255,255,0.5);max-width:400px;line-height:1.7;margin-bottom:2.5rem;}
  a{display:inline-block;padding:10px 22px;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;border-radius:8px;transition:border-color 0.2s,color 0.2s;}
  a:hover{border-color:var(--yellow);color:var(--yellow);}
</style>
</head>
<body>
  <p class="eyebrow">The Internet Generation</p>
  <h1>TigPods</h1>
  <p>Chennai's podcast for creative professionals. 2 seasons, 30+ episodes. Coming to the web soon.</p>
  <a href="/">← Back to TIG</a>
</body>
</html>
