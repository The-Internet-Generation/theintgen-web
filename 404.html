<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — File Not Found | The Internet Generation</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#008080;background-image:radial-gradient(#007070 1px,transparent 0);background-size:2px 2px;
    font-family:'Hanken Grotesk',sans-serif;font-size:13px}
  .wframe{width:min(420px,92vw);background:#c0c0c0;
    border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #000;border-bottom:1px solid #000;
    box-shadow:inset -1px -1px 0 #808080,inset 1px 1px 0 #dfdfdf,4px 4px 0 rgba(0,0,0,.25)}
  .wtbar{background:linear-gradient(to right,#000080,#1084d0);color:#fff;padding:4px 8px;
    font-weight:700;font-size:12px;display:flex;justify-content:space-between;align-items:center}
  .wcontent{padding:20px;color:#000}
  .wcontent h1{font-size:15px;margin:0 0 8px}
  .wcontent p{margin:0 0 16px;line-height:1.5}
  a.btn{display:inline-block;padding:6px 18px;background:#c0c0c0;color:#000;text-decoration:none;font-weight:700;
    border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #000;border-bottom:1px solid #000;
    box-shadow:inset -1px -1px 0 #808080,inset 1px 1px 0 #dfdfdf}
  a.btn:active{border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff}
</style>
</head>
<body>
<div class="wframe">
  <div class="wtbar"><span>Error — C:\WINDOWS\404</span><span>✕</span></div>
  <div class="wcontent">
    <h1>404 — File Not Found</h1>
    <p>The page you're looking for doesn't exist or has moved. Try the TIG OS desktop — everything lives there.</p>
    <a class="btn" href="/">← Back to TIG OS</a> &nbsp;
    <a class="btn" href="/tiggigs/">Job Board</a>
  </div>
</div>
</body>
</html>
